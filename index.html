<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flow Foundry</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div class="app-shell">

    <header class="topbar">
      <div>
        <h1>Flow Foundry</h1>
        <p class="tagline">Rotate tiles. Connect the flow.</p>
      </div>
      <button id="soundBtn" class="secondary-btn icon-btn" aria-label="Toggle sound">🔊</button>
    </header>

    <div class="card hud">
      <div class="hud-item">
        <span>Moves</span>
        <strong id="movesLabel">0</strong>
      </div>
      <div class="hud-item">
        <span>Best</span>
        <strong id="bestLabel">—</strong>
      </div>
      <div class="hud-item">
        <span>Stars</span>
        <strong id="starsLabel">0</strong>
      </div>
      <div class="hud-item">
        <span>Progress</span>
        <strong id="progressLabel">1 / 40 unlocked</strong>
      </div>
    </div>

    <div class="game-layout">
      <div class="card board-card">
        <div class="board-header">
          <div>
            <h2>Level <span id="levelLabel">1</span> — <span id="levelTitle"></span></h2>
            <p id="levelGoal"></p>
          </div>
        </div>
        <div id="board" class="board"></div>
        <div class="card controls">
          <button id="resetBtn" class="secondary-btn icon-btn" title="Reset (R)">↺ Reset</button>
          <button id="undoBtn" class="secondary-btn icon-btn" title="Undo (U)">⟲ Undo</button>
          <button id="hintBtn" class="secondary-btn icon-btn" title="Hint (H)">💡 Hint</button>
          <button id="playFlowBtn" class="secondary-btn icon-btn" title="Test Flow (T)">▶ Test</button>
        </div>
        <p class="controls-help">
          <kbd>R</kbd> Reset &nbsp; <kbd>U</kbd> Undo &nbsp; <kbd>H</kbd> Hint &nbsp; <kbd>T</kbd> Test &nbsp; <kbd>N</kbd> Next
        </p>
        <div style="display:flex;justify-content:flex-end;padding:0 10px 10px">
          <button id="nextBtn" disabled title="Next Level (N)">Next →</button>
        </div>
      </div>

      <div class="card levels-panel">
        <div class="levels-head">
          <h3 style="margin:0">Levels</h3>
        </div>
        <div id="levelGrid" class="level-grid"></div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <div id="winModal" class="modal hidden">
    <div class="modal-card">
      <h2>System Online!</h2>
      <div id="starDisplay" class="star-display">★★★</div>
      <p id="winText"></p>
      <div class="modal-actions">
        <button id="winReplayBtn" class="secondary-btn">↺ Replay</button>
        <button id="winNextBtn">Next →</button>
      </div>
    </div>
  </div>

  <script src="src/levels.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
